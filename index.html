<script>
'use strict';
const html = htm.bind(React.createElement);
const { useState, useEffect, useCallback, useRef } = React;

// ── COLOURS ──────────────────────────────────────────────────────────────────
const C = {
  sage:'#5F8B6A',sageLt:'#EAF2EC',sageMd:'#A8C9AE',
  coral:'#D96B50',coralLt:'#FAF0EC',
  amber:'#E8A030',amberLt:'#FEF5E7',
  cream:'#FFFDF8',card:'#FFFFFF',
  text:'#2A2520',textMuted:'#7A7065',textLight:'#B0A89E',
  border:'#EDE8E2',borderMd:'#D5CEC5',
  purple:'#7C6DA0',purpleLt:'#F0EDF8',
  blue:'#4A82B8',blueLt:'#EBF3FB',
  red:'#C95050',redLt:'#FAEAEA',
  green:'#3D8B5A',greenLt:'#E8F5EE',
};

// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
let database = null;
let auth = null;
let fileStorage = null;
let firebaseSetupError = '';
try {
  const firebaseConfig = window.FAMILY_OS_FIREBASE_CONFIG || {};
  const missingConfig = !firebaseConfig.apiKey || String(firebaseConfig.apiKey).startsWith('PASTE_');
  if (missingConfig) throw new Error('Firebase setup is incomplete. Update firebase-config.js with the Web App configuration from your new Firebase project.');
  const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
  database = firebase.database(app);
  auth = firebase.auth(app);
  fileStorage = firebase.storage(app);
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  console.log('Firebase initialized');
} catch (e) {
  firebaseSetupError = e.message || 'Firebase could not be initialized.';
  console.error(firebaseSetupError);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const today = () => { const d=new Date(); const off=d.getTimezoneOffset(); return new Date(d.getTime()-off*60000).toISOString().split('T')[0]; };
const fmt = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
const daysUntil = d => Math.ceil((new Date(d+'T00:00:00') - new Date()) / 86400000);
const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`);
const recurringDate = (ev, yr) => {
  if (!ev.recurring) return ev.date;
  const o = new Date(ev.date+'T00:00:00');
  return `${yr}-${String(o.getMonth()+1).padStart(2,'0')}-${String(o.getDate()).padStart(2,'0')}`;
};
const safeFilename = name => String(name||'file').replace(/[^a-zA-Z0-9._-]+/g,'-').slice(0,100);
const formatBytes = bytes => bytes < 1024 ? `${bytes} B` : bytes < 1048576 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1048576).toFixed(1)} MB`;
async function getAuthToken() {
  if (!auth?.currentUser) throw new Error('Please sign in again.');
  return auth.currentUser.getIdToken();
}
async function uploadFiles(files, area, itemId, setProgress=()=>{}) {
  if (!fileStorage || !auth?.currentUser) throw new Error('File storage is not ready.');
  const list = Array.from(files||[]);
  const uploaded = [];
  for (let i=0;i<list.length;i++) {
    const file=list[i];
    if (!(file.type.startsWith('image/') || file.type==='application/pdf')) throw new Error('Only images and PDFs are allowed.');
    if (file.size > 10*1024*1024) throw new Error('Each file must be smaller than 10 MB.');
    const attachmentId=uid();
    const storagePath=`users/${auth.currentUser.uid}/${area}/${itemId}/${attachmentId}-${safeFilename(file.name)}`;
    const ref=fileStorage.ref(storagePath);
    await new Promise((resolve,reject)=>{
      const task=ref.put(file,{contentType:file.type||'application/octet-stream'});
      task.on('state_changed', snap=>setProgress(Math.round(((i+snap.bytesTransferred/snap.totalBytes)/list.length)*100)), reject, resolve);
    });
    uploaded.push({id:attachmentId,storagePath,originalName:file.name,mimeType:file.type,sizeBytes:file.size,createdAt:new Date().toISOString()});
  }
  setProgress(100);
  return uploaded;
}
async function previewAttachment(att) {
  try {
    const url=await fileStorage.ref(att.storagePath).getDownloadURL();
    window.open(url,'_blank','noopener,noreferrer');
  } catch(e) { alert(`Could not open file: ${e.message}`); }
}
async function deleteStoredAttachment(att) {
  if (!att?.storagePath || !fileStorage) return;
  try { await fileStorage.ref(att.storagePath).delete(); } catch(e) { if (e.code!=='storage/object-not-found') throw e; }
}


// ── SAFE EMPTY DATA ───────────────────────────────────────────────────────────
const SEED = {
  tasks: [],
  events: [],
  maintenance: [],
  cleaning: { daily: [], weekly: [], monthly: [], quarterly: [] },
  groceries: { master: [], weekly: [], fridge: [] },
  recipes: [],
  mealPlan: {},
  trips: [],
  parties: [],
  baby: { name: 'Child', dob: '', lessonPlans: [], solids: [], inventory: [], milestones: [] },
  records: [],
  receiptsCoupons: []
};
const freshEmptyData = () => JSON.parse(JSON.stringify(SEED));
const normalizeData = value => {
  const d = value && typeof value === 'object' ? value : {};
  return {
    ...freshEmptyData(),
    ...d,
    tasks: Array.isArray(d.tasks) ? d.tasks : [],
    events: Array.isArray(d.events) ? d.events : [],
    maintenance: Array.isArray(d.maintenance) ? d.maintenance : [],
    cleaning: {...SEED.cleaning,...(d.cleaning||{})},
    groceries: {...SEED.groceries,...(d.groceries||{})},
    recipes: Array.isArray(d.recipes) ? d.recipes : [],
    mealPlan: d.mealPlan && typeof d.mealPlan === 'object' ? d.mealPlan : {},
    trips: Array.isArray(d.trips) ? d.trips : [],
    parties: Array.isArray(d.parties) ? d.parties : [],
    baby: {...SEED.baby,...(d.baby||{}),lessonPlans:Array.isArray(d.baby?.lessonPlans)?d.baby.lessonPlans:[],solids:Array.isArray(d.baby?.solids)?d.baby.solids:[],inventory:Array.isArray(d.baby?.inventory)?d.baby.inventory:[],milestones:Array.isArray(d.baby?.milestones)?d.baby.milestones:[]},
    records: Array.isArray(d.records) ? d.records.map(r=>({...r,attachments:Array.isArray(r.attachments)?r.attachments:[]})) : [],
    receiptsCoupons: Array.isArray(d.receiptsCoupons) ? d.receiptsCoupons.map(r=>({...r,attachments:Array.isArray(r.attachments)?r.attachments:[]})) : []
  };
};

// ── SHARED UI COMPONENTS ──────────────────────────────────────────────────────
function Badge({children,color='sage',small}) {
  const bg={sage:C.sageLt,coral:C.coralLt,amber:C.amberLt,purple:C.purpleLt,blue:C.blueLt,red:C.redLt,green:C.greenLt};
  const fg={sage:C.sage,coral:C.coral,amber:C.amber,purple:C.purple,blue:C.blue,red:C.red,green:C.green};
  return html`<span style=${{background:bg[color]||C.sageLt,color:fg[color]||C.sage,borderRadius:6,padding:small?'2px 7px':'3px 10px',fontSize:small?11:12,fontWeight:600,whiteSpace:'nowrap'}}>${children}</span>`;
}

function Btn({children,onClick,variant='primary',small,danger,style:sx,disabled}) {
  const v = danger ? 'danger' : variant;
  const base = {border:'none',borderRadius:8,cursor:disabled?'not-allowed':'pointer',fontFamily:'inherit',fontWeight:600,transition:'all 0.15s',display:'inline-flex',alignItems:'center',gap:6,opacity:disabled?0.5:1};
  const vs = {
    primary:{background:C.sage,color:'#fff',padding:small?'8px 14px':'10px 20px',fontSize:small?13:14},
    outline:{background:'transparent',color:C.text,border:`1.5px solid ${C.borderMd}`,padding:small?'7px 13px':'9px 19px',fontSize:small?13:14},
    ghost:{background:'transparent',color:C.textMuted,padding:small?'7px 10px':'8px 14px',fontSize:small?13:14},
    danger:{background:C.redLt,color:C.red,padding:small?'7px 13px':'9px 19px',fontSize:small?13:14,border:`1.5px solid ${C.red}22`},
  };
  return html`<button onClick=${disabled?undefined:onClick} style=${{...base,...vs[v],...sx}}>${children}</button>`;
}

function Card({children,style:sx,onClick}) {
  return html`<div onClick=${onClick} style=${{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:'16px 18px',boxShadow:'0 1px 4px rgba(0,0,0,0.04)',cursor:onClick?'pointer':'default',...sx}}>${children}</div>`;
}

function Inp({label,value,onChange,type='text',placeholder,required,style:sx}) {
  return html`<div style=${{display:'flex',flexDirection:'column',gap:5,...sx}}>
    ${label && html`<label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>${label}${required&&html`<span style=${{color:C.coral}}> *</span>`}</label>`}
    <input type=${type} value=${value||''} onInput=${e=>onChange(e.target.value)} placeholder=${placeholder||''}
      style=${{border:`1.5px solid ${C.border}`,borderRadius:8,padding:'10px 13px',fontSize:14,background:C.cream,color:C.text,width:'100%'}}/>
  </div>`;
}

function Sel({label,value,onChange,options,style:sx}) {
  return html`<div style=${{display:'flex',flexDirection:'column',gap:5,...sx}}>
    ${label && html`<label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>${label}</label>`}
    <select value=${value||''} onChange=${e=>onChange(e.target.value)}
      style=${{border:`1.5px solid ${C.border}`,borderRadius:8,padding:'10px 13px',fontSize:14,background:C.cream,color:C.text}}>
      ${options.map(o=>html`<option key=${o.value||o} value=${o.value||o}>${o.label||o}</option>`)}
    </select>
  </div>`;
}

function Txa({label,value,onChange,placeholder,rows=4,style:sx}) {
  return html`<div style=${{display:'flex',flexDirection:'column',gap:5,...sx}}>
    ${label && html`<label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>${label}</label>`}
    <textarea value=${value||''} onInput=${e=>onChange(e.target.value)} placeholder=${placeholder||''} rows=${rows}
      style=${{border:`1.5px solid ${C.border}`,borderRadius:8,padding:'10px 13px',fontSize:14,background:C.cream,color:C.text,resize:'vertical',width:'100%'}}></textarea>
  </div>`;
}

function Modal({title,open,onClose,children}) {
  useEffect(()=>{ document.body.style.overflow = open?'hidden':''; return()=>{document.body.style.overflow='';}; },[open]);
  if (!open) return null;
  return html`<div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick=${onClose}>
    <div onClick=${e=>e.stopPropagation()} style=${{background:C.card,borderRadius:'20px 20px 0 0',width:'100%',maxWidth:560,maxHeight:'92vh',overflow:'auto',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)'}}>
      <div style=${{padding:'18px 20px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,background:C.card,zIndex:1}}>
        <h3 style=${{margin:0,fontSize:17,fontWeight:700,color:C.text,fontFamily:"'DM Serif Display',serif"}}>${title}</h3>
        <button onClick=${onClose} style=${{background:'none',border:'none',cursor:'pointer',fontSize:22,color:C.textMuted,padding:'4px 8px'}}>✕</button>
      </div>
      <div style=${{padding:'16px 20px 32px'}}>${children}</div>
    </div>
  </div>`;
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
function SyncPanel({data,onImport,onClose}) {
  const [mode,setMode] = useState('choose');
  const [code,setCode] = useState('');
  const [status,setStatus] = useState('');

  const exportFile = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));
    a.download = `family-life-os-${today()}.json`; a.click();
    setStatus('✓ Downloaded! Send via WhatsApp or iMessage.');
  };
  const copyCode = async () => {
    try { await navigator.clipboard.writeText(btoa(JSON.stringify(data))); setStatus('✓ Copied! Paste in a message.'); }
    catch { setStatus('Use Download option instead.'); }
  };
  const importFile = e => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try { const d=JSON.parse(ev.target.result); if(d.tasks&&d.events){onImport(d);setTimeout(onClose,800);} else setStatus('Invalid file.'); }
      catch { setStatus('Could not read file.'); }
    };
    r.readAsText(file);
  };
  const importCode = () => {
    try { const d=JSON.parse(atob(code.trim())); if(d.tasks&&d.events){onImport(d);setTimeout(onClose,800);} else setStatus('Invalid data.'); }
    catch { setStatus('Could not read — paste the full code.'); }
  };

  return html`<div style=${{display:'flex',flexDirection:'column',gap:12}}>
    ${mode==='choose' && html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{background:C.blueLt,borderRadius:10,padding:'10px 14px',fontSize:13,color:C.blue,lineHeight:1.6}}>
        <strong>Family Sync:</strong> One person exports, the other imports. Takes 10 seconds!
      </div>
      <${Btn} onClick=${()=>setMode('export')} style=${{justifyContent:'center',padding:'14px'}}>📤 Share my data<//>
      <${Btn} variant="outline" onClick=${()=>setMode('import')} style=${{justifyContent:'center',padding:'14px'}}>📥 Import from family<//>
    </div>`}
    ${mode==='export' && html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      <${Btn} variant="ghost" small onClick=${()=>setMode('choose')}>← Back<//>
      <${Card} onClick=${exportFile} style=${{cursor:'pointer'}}>
        <div style=${{fontWeight:600,color:C.text}}>📥 Download as file</div>
        <div style=${{fontSize:13,color:C.textMuted,marginTop:3}}>Send .json file via WhatsApp, iMessage, email</div>
      <//>
      <${Card} onClick=${copyCode} style=${{cursor:'pointer'}}>
        <div style=${{fontWeight:600,color:C.text}}>📋 Copy as text code</div>
        <div style=${{fontSize:13,color:C.textMuted,marginTop:3}}>Copy a code, paste in a message</div>
      <//>
      ${status && html`<div style=${{background:C.greenLt,color:C.green,borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:600}}>${status}</div>`}
    </div>`}
    ${mode==='import' && html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      <${Btn} variant="ghost" small onClick=${()=>setMode('choose')}>← Back<//>
      <label style=${{display:'block',background:C.sageLt,border:`2px dashed ${C.sageMd}`,borderRadius:10,padding:'20px',textAlign:'center',cursor:'pointer',fontSize:14,color:C.sage,fontWeight:600}}>
        📁 Tap to choose backup file
        <input type="file" accept=".json" onChange=${importFile} style=${{display:'none'}}/>
      </label>
      <div style=${{textAlign:'center',color:C.textMuted,fontSize:13}}>— or paste text code —</div>
      <${Txa} label="Paste code" value=${code} onChange=${setCode} placeholder="Paste the code here..." rows=${3}/>
      <${Btn} onClick=${importCode} disabled=${!code.trim()}>Import<//>
      ${status && html`<div style=${{background:status.startsWith('✓')?C.greenLt:C.redLt,color:status.startsWith('✓')?C.green:C.red,borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:600}}>${status}</div>`}
    </div>`}
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({data,navigate}) {
  const hr = new Date().getHours();
  const greeting = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const yr = new Date().getFullYear();
  const activeTasks = data.tasks.filter(t=>t.status!=='done');
  const upcoming = [...data.events]
    .filter(e=>{ const du=daysUntil(recurringDate(e,yr)); return du>=0&&du<=30; })
    .sort((a,b)=>daysUntil(recurringDate(a,yr))-daysUntil(recurringDate(b,yr))).slice(0,4);
  const overdue = data.maintenance.filter(m=>daysUntil(m.nextDue)<=0);
  const babyAge = data.baby.dob ? Math.max(0,Math.floor((new Date()-new Date(data.baby.dob+'T00:00:00'))/(1000*60*60*24*30.44))) : null;
  const eCol = {birthday:'coral',anniversary:'purple',appointment:'blue',event:'sage'};

  return html`<div>
    <div style=${{marginBottom:22}}>
      <h1 style=${{margin:'0 0 3px',fontSize:26,fontWeight:700,color:C.text,fontFamily:"'DM Serif Display',serif"}}>${greeting} ✦</h1>
      <p style=${{margin:0,color:C.textMuted,fontSize:14}}>${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>
    </div>
    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
      ${[
        {label:'Open Tasks',val:activeTasks.length,c:C.coral,bg:C.coralLt,icon:'✅',nav:'tasks'},
        {label:'Events (30d)',val:upcoming.length,c:C.purple,bg:C.purpleLt,icon:'📅',nav:'calendar'},
        {label:'Overdue Maint.',val:overdue.length,c:C.amber,bg:C.amberLt,icon:'🏡',nav:'homecare'},
        {label:`${data.baby.name||'Child'}${babyAge===null?'':` ${babyAge}mo`}`,val:data.baby.lessonPlans.length+' plans',c:C.sage,bg:C.sageLt,icon:'👶',nav:'baby'},
      ].map(s=>html`<div key=${s.nav} onClick=${()=>navigate(s.nav)} style=${{background:s.bg,borderRadius:12,padding:'14px 16px',cursor:'pointer',border:`1px solid ${s.c}22`}}>
        <div style=${{fontSize:20,marginBottom:6}}>${s.icon}</div>
        <div style=${{fontSize:22,fontWeight:700,color:s.c}}>${s.val}</div>
        <div style=${{fontSize:11,color:C.textMuted,marginTop:2}}>${s.label}</div>
      </div>`)}
    </div>
    <div style=${{display:'flex',flexDirection:'column',gap:14}}>
      <${Card}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style=${{fontWeight:700,fontSize:14,color:C.text}}>Open Tasks</span>
          <${Btn} variant="ghost" small onClick=${()=>navigate('tasks')}>See all →<//>
        </div>
        ${activeTasks.slice(0,4).map(t=>html`<div key=${t.id} style=${{display:'flex',gap:10,alignItems:'center',paddingBottom:9,marginBottom:9,borderBottom:`1px solid ${C.border}`}}>
          <div style=${{width:7,height:7,borderRadius:'50%',background:t.priority==='high'?C.coral:t.priority==='medium'?C.amber:C.sage,flexShrink:0}}></div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:14,color:C.text}}>${t.title}</div>
            ${t.dueDate&&html`<div style=${{fontSize:12,color:C.textMuted}}>${fmt(t.dueDate)} · ${t.owner}</div>`}
          </div>
        </div>`)}
        ${activeTasks.length===0&&html`<p style=${{color:C.textMuted,textAlign:'center'}}>All clear! 🎉</p>`}
      <//>
      <${Card}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style=${{fontWeight:700,fontSize:14,color:C.text}}>Upcoming Events</span>
          <${Btn} variant="ghost" small onClick=${()=>navigate('calendar')}>Calendar →<//>
        </div>
        ${upcoming.map(e=>{
          const d=recurringDate(e,yr), du=daysUntil(d);
          const dt=new Date(d+'T00:00:00');
          return html`<div key=${e.id} style=${{display:'flex',gap:12,alignItems:'center',paddingBottom:9,marginBottom:9,borderBottom:`1px solid ${C.border}`}}>
            <div style=${{background:C.sageLt,borderRadius:8,padding:'4px 8px',textAlign:'center',minWidth:44,flexShrink:0}}>
              <div style=${{fontSize:10,color:C.sage,fontWeight:700}}>${dt.toLocaleDateString('en-US',{month:'short'})}</div>
              <div style=${{fontSize:17,fontWeight:700,color:C.text,lineHeight:1.1}}>${dt.getDate()}</div>
            </div>
            <div style=${{flex:1}}>
              <div style=${{fontSize:14,color:C.text}}>${e.title}</div>
              <div style=${{fontSize:12,color:C.textMuted}}>${du===0?'Today!':du===1?'Tomorrow':`In ${du} days`}</div>
            </div>
            <${Badge} color=${eCol[e.type]||'sage'} small>${e.type}<//>
          </div>`;
        })}
        ${upcoming.length===0&&html`<p style=${{color:C.textMuted,fontSize:14}}>No events in next 30 days</p>`}
      <//>
      <${Card} style=${{background:`linear-gradient(135deg,${C.sageLt},${C.amberLt})`}}>

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function CalendarSection({data,updateData}) {
  const [view,setView] = useState({month:new Date().getMonth(),year:new Date().getFullYear()});
  const [modal,setModal] = useState(false);
  const [edit,setEdit] = useState(null);
  const [f,setF] = useState({title:'',date:'',type:'event',recurring:false,notes:''});
  const open = item => { setEdit(item); setF(item?{...item}:{title:'',date:'',type:'event',recurring:false,notes:''}); setModal(true); };
  const save = () => {
    if (!f.title||!f.date) return;
    updateData({events: edit ? data.events.map(e=>e.id===edit.id?{...f,id:edit.id,recurring:!!f.recurring}:e) : [...data.events,{...f,id:uid(),recurring:!!f.recurring}]});
    setModal(false);
  };
  const del = id => { updateData({events:data.events.filter(e=>e.id!==id)}); setModal(false); };
  const dim = new Date(view.year,view.month+1,0).getDate();
  const fd = new Date(view.year,view.month,1).getDay();
  const tc = {birthday:C.coral,anniversary:C.purple,appointment:C.blue,event:C.sage};
  const eventsForDay = d => {
    const ds = `${view.year}-${String(view.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return data.events.filter(e=>recurringDate(e,view.year)===ds);
  };
  const upcoming = [...data.events].map(e=>({...e,rd:recurringDate(e,view.year)}))
    .filter(e=>daysUntil(e.rd)>=0).sort((a,b)=>daysUntil(a.rd)-daysUntil(b.rd)).slice(0,6);
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Calendar</h2>
      <${Btn} onClick=${()=>open(null)} small>+ Event<//>
    </div>
    <${Card} style=${{padding:0,marginBottom:14}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 16px',borderBottom:`1px solid ${C.border}`}}>
        <${Btn} variant="ghost" small onClick=${()=>setView(v=>({month:v.month===0?11:v.month-1,year:v.month===0?v.year-1:v.year}))}>‹<//>
        <span style=${{fontWeight:700,fontSize:16,color:C.text}}>${MONTHS[view.month]} ${view.year}</span>
        <${Btn} variant="ghost" small onClick=${()=>setView(v=>({month:v.month===11?0:v.month+1,year:v.month===11?v.year+1:v.year}))}>›<//>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        ${['S','M','T','W','T','F','S'].map((d,i)=>html`<div key=${i} style=${{textAlign:'center',padding:'8px 2px',fontSize:11,fontWeight:700,color:C.textMuted}}>${d}</div>`)}
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
        ${Array.from({length:fd},(_,i)=>html`<div key=${'e'+i}></div>`)}
        ${Array.from({length:dim},(_,i)=>i+1).map(d=>{
          const evs=eventsForDay(d);
          const isT=today()===`${view.year}-${String(view.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          return html`<div key=${d} onClick=${()=>evs.length&&open(evs[0])} style=${{minHeight:52,padding:'5px 3px',borderTop:`1px solid ${C.border}`,background:isT?C.sageLt:'transparent',cursor:evs.length?'pointer':'default'}}>
            <div style=${{fontSize:12,fontWeight:isT?700:400,color:isT?C.sage:C.text,textAlign:'center',marginBottom:2}}>${d}</div>
            ${evs.slice(0,2).map(e=>html`<div key=${e.id} style=${{fontSize:10,background:tc[e.type]||C.sage,color:'#fff',borderRadius:3,padding:'1px 3px',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${e.recurring?'↻ ':''}${e.title.split(' ').slice(0,2).join(' ')}</div>`)}
          </div>`;
        })}
      </div>
    <//>
    <div style=${{fontWeight:700,fontSize:12,color:C.textMuted,marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>Coming Up</div>
    <div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${upcoming.map(e=>{ const du=daysUntil(e.rd); return html`<${Card} key=${e.id} style=${{padding:'12px 15px'}}>
        <div style=${{display:'flex',alignItems:'center',gap:12}}>
          <div style=${{width:6,height:6,borderRadius:'50%',background:tc[e.type]||C.sage,flexShrink:0}}></div>
          <div style=${{flex:1}}>
            <div style=${{fontSize:14,fontWeight:600,color:C.text}}>${e.title}${e.recurring&&html`<span style=${{fontSize:11,color:C.purple,marginLeft:6}}>↻</span>`}</div>
            <div style=${{fontSize:12,color:C.textMuted}}>${fmt(e.rd)} · ${du===0?'Today!':du===1?'Tomorrow':`${du} days`}</div>
          </div>
          <${Btn} variant="ghost" small onClick=${()=>open(e)}>✎<//>
          <${Btn} variant="ghost" small onClick=${()=>del(e.id)}>✕<//>
        </div>
      <//>`;} )}
    </div>
    <${Modal} title=${edit?'Edit Event':'New Event'} open=${modal} onClose=${()=>setModal(false)}>
      <div style=${{display:'flex',flexDirection:'column',gap:13}}>
        <${Inp} label="Title" value=${f.title} onChange=${v=>setF({...f,title:v})} required=${true}/>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <${Inp} label="Date" type="date" value=${f.date} onChange=${v=>setF({...f,date:v})} required=${true}/>
          <${Sel} label="Type" value=${f.type} onChange=${v=>setF({...f,type:v})} options=${['event','birthday','anniversary','appointment']}/>
        </div>
        <div style=${{display:'flex',alignItems:'center',gap:10,background:C.purpleLt,borderRadius:8,padding:'10px 12px'}}>
          <input type="checkbox" id="rc" checked=${!!f.recurring} onChange=${e=>setF({...f,recurring:e.target.checked})} style=${{width:16,height:16}}/>
          <label for="rc" style=${{fontSize:14,color:C.text,cursor:'pointer'}}>Repeat every year (birthdays & anniversaries)</label>
        </div>
        <${Inp} label="Notes" value=${f.notes} onChange=${v=>setF({...f,notes:v})}/>
        <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <${Btn} variant="outline" onClick=${()=>setModal(false)}>Cancel<//>
          ${edit&&html`<${Btn} danger onClick=${()=>del(edit.id)}>Delete<//>`}
          <${Btn} onClick=${save}>Save<//>
        </div>
      </div>
    <//>
  </div>`;
}

  const [mpCell,setMpCell] = useState(null);
  const [mpCustomText,setMpCustomText] = useState('');
  const openModal = item => { setEdit(item||null); setF(item?{...item}:{name:'',category:'Dinner',servings:4,prepTime:'',cookTime:'',tags:'',ingredients:'',instructions:'',note:'',nutrition:{calories:0,protein:0,carbs:0,fat:0}}); setModal(true); };
  const save = () => { if(!f.name) return; updateData({recipes:edit?data.recipes.map(r=>r.id===edit.id?{...f,id:edit.id}:r):[...data.recipes,{...f,id:uid()}]}); setModal(false); };
  const del = id => { updateData({recipes:data.recipes.filter(r=>r.id!==id)}); setView(null); };
  const download = () => {
    const txt = data.recipes.map(r=>`${r.name}\n${'='.repeat(r.name.length)}\n\nINGREDIENTS:\n${r.ingredients}\n\nINSTRUCTIONS:\n${r.instructions}\n\n${'─'.repeat(40)}\n`).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'})); a.download='My_Recipes.txt'; a.click();
  };

// const nutrition = await response.json();
//   console.log('Nutrition data received:', nutrition);

//   setF(prev => ({
//     ...prev,
//     nutrition: {
//       calories: Number(nutrition.calories) || 0,
//       protein: Number(nutrition.protein) || 0,
//       carbs: Number(nutrition.carbs) || 0,
//       fat: Number(nutrition.fat) || 0
//     }
//   }));
const calcNutrition = async () => {
  console.log('AI Calc clicked!');
  if (!f.ingredients) return;
  setAiLoading(true);
  try {
    const response = await fetch('/api/nutrition', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await getAuthToken()}` },
      body: JSON.stringify({ 
        ingredients: f.ingredients, 
        servings: f.servings || 1 
      })
    });
    
    if (!response.ok) throw new Error('Failed to calculate nutrition');
    
    const nutrition = await response.json();
    console.log('Nutrition data received:', nutrition);
    setF(prev => ({
      ...prev,
      nutrition: {
        calories: Number(nutrition.calories) || 0,
        protein: Number(nutrition.protein) || 0,
        carbs: Number(nutrition.carbs) || 0,
        fat: Number(nutrition.fat) || 0
      }
    }));
  } catch (error) {
    console.error("Nutrition calc failed:", error);
  }
  setAiLoading(false);
};
  const wDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map((d,i)=>{ const dt=new Date(mpWeek+'T00:00:00'); dt.setDate(dt.getDate()+i); return {day:d,short:d.slice(0,3),date:dt.toISOString().split('T')[0]}; });
  const getMealItems = (day,who,slot) => {
    const v = data.mealPlan?.[mpWeek]?.[day]?.[who]?.[slot];
    if(!v) return [];
    return Array.isArray(v) ? v : [v]; // backward-compatible with old single-string entries
  };
  const setMealItems = (day,who,slot,items) => {
    const mp={...data.mealPlan}; if(!mp[mpWeek])mp[mpWeek]={}; if(!mp[mpWeek][day])mp[mpWeek][day]={}; if(!mp[mpWeek][day][who])mp[mpWeek][day][who]={};
    mp[mpWeek][day][who]={...mp[mpWeek][day][who],[slot]:items}; updateData({mealPlan:mp});
  };
  const toggleMealItem = (day,who,slot,name) => {
    const cur = getMealItems(day,who,slot);
    setMealItems(day,who,slot, cur.includes(name) ? cur.filter(x=>x!==name) : [...cur,name]);
  };
  const addCustomMealItem = (day,who,slot,name) => {
    const n=(name||'').trim(); if(!n) return;
    const cur = getMealItems(day,who,slot);
    if(cur.includes(n)) return;
    setMealItems(day,who,slot,[...cur,n]);
  };
  const removeMealItem = (day,who,slot,name) => {
    setMealItems(day,who,slot,getMealItems(day,who,slot).filter(x=>x!==name));
  };
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Kitchen</h2>
      ${tab==='recipes'&&html`<div style=${{display:'flex',gap:6}}><${Btn} variant="outline" small onClick=${download}>⬇<//>  <${Btn} small onClick=${()=>openModal(null)}>+ Recipe<//>  </div>`}
    </div>
    <div style=${{display:'flex',gap:6,marginBottom:16}}>
      ${[['recipes','🍳 Recipes'],['mealplan','📅 Meal Plan']].map(([k,l])=>html`<button key=${k} onClick=${()=>setTab(k)} style=${{border:`1.5px solid ${tab===k?C.sage:C.border}`,background:tab===k?C.sage:'transparent',color:tab===k?'#fff':C.textMuted,borderRadius:8,padding:'8px 16px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>${l}</button>`)}
    </div>
    ${tab==='recipes'&&html`<div style=${{display:'flex',flexDirection:'column',gap:10}}>
      ${data.recipes.map(r=>html`<${Card} key=${r.id} onClick=${()=>setView(r)} style=${{cursor:'pointer',padding:'14px 16px'}}>
        <div style=${{fontWeight:700,fontSize:16,color:C.text,marginBottom:6}}>${r.name}</div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          <${Badge} color="sage" small>${r.category}<//>
          <${Badge} color="blue" small>⏱ ${r.prepTime}+${r.cookTime}<//>
          <${Badge} color="amber" small>👤 ${r.servings}<//>
        </div>
        ${r.nutrition&&html`<div style=${{display:'flex',gap:10,background:C.sageLt,borderRadius:8,padding:'7px 12px'}}>
          ${[['Cal',r.nutrition.calories,''],['Pro',r.nutrition.protein,'g'],['Carb',r.nutrition.carbs,'g'],['Fat',r.nutrition.fat,'g']].map(([l,v,u])=>html`<div key=${l} style=${{textAlign:'center',flex:1}}><div style=${{fontSize:13,fontWeight:700,color:C.sage}}>${v}${u}</div><div style=${{fontSize:10,color:C.textMuted}}>${l}</div></div>`)}
        </div>`}
      <//>` )}
    </div>`}
    ${tab==='mealplan'&&html`<div>
      <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <span style=${{fontWeight:600,color:C.text,fontSize:14}}>Week of</span>
        <input type="date" value=${mpWeek} onChange=${e=>setMpWeek(e.target.value)} style=${{border:`1.5px solid ${C.border}`,borderRadius:8,padding:'8px 12px',fontSize:14,fontFamily:'inherit'}}/>
      </div>
      ${[['Adults','adults',['Breakfast','Lunch','Dinner']],[(data.baby.name||'Child')+' 🌟','baby',['Breakfast','Snack 1','Lunch','Snack 2','Dinner']]].map(([label,who,slots])=>html`<div key=${who} style=${{marginBottom:24}}>
        <div style=${{fontWeight:700,fontSize:15,color:C.text,marginBottom:10,paddingBottom:6,borderBottom:`2px solid ${who==='baby'?C.amber:C.sage}`}}>${label}</div>
        <div style=${{overflowX:'auto'}}>
          <table style=${{width:'100%',minWidth:480,borderCollapse:'collapse'}}>
            <thead><tr>
              <th style=${{padding:'6px 8px',fontSize:11,fontWeight:700,color:C.textMuted,textAlign:'left',minWidth:70}}>Meal</th>
              ${wDays.map(d=>html`<th key=${d.day} style=${{padding:'6px 4px',fontSize:11,fontWeight:700,color:d.date===today()?C.sage:C.textMuted,textAlign:'center',minWidth:58}}>${d.short}</th>`)}
            </tr></thead>
            <tbody>${slots.map(slot=>html`<tr key=${slot}>
              <td style=${{padding:'4px 8px',fontSize:12,fontWeight:600,color:C.textMuted,whiteSpace:'nowrap'}}>${slot}</td>
              ${wDays.map(d=>{ const items=getMealItems(d.day,who,slot); return html`<td key=${d.day} style=${{padding:'3px 4px'}}>
                <div onClick=${()=>{setMpCell({day:d.day,who,slot});setMpCustomText('');}}
                  style=${{width:'100%',minHeight:30,boxSizing:'border-box',border:`1px solid ${C.border}`,borderRadius:5,padding:'4px 5px',fontSize:10.5,fontFamily:'inherit',background:C.cream,cursor:'pointer',display:'flex',flexWrap:'wrap',gap:3,alignItems:'center'}}>
                  ${items.length ? items.map(it=>html`<span key=${it} style=${{background:C.sageLt,color:C.sage,borderRadius:4,padding:'1px 5px',fontSize:10,fontWeight:600,whiteSpace:'nowrap'}}>${it}</span>`) : html`<span style=${{color:C.textMuted}}>···</span>`}
                </div>
              </td>`; })}
            </tr>`)}</tbody>
          </table>
        </div>
      </div>`)}
    </div>`}
    <${Modal} title=${mpCell?`${mpCell.slot} · ${wDays.find(d=>d.day===mpCell.day)?.short||''}`:''} open=${!!mpCell} onClose=${()=>setMpCell(null)}>
      ${mpCell&&html`<div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16,minHeight:32}}>
          ${getMealItems(mpCell.day,mpCell.who,mpCell.slot).length ? getMealItems(mpCell.day,mpCell.who,mpCell.slot).map(it=>html`<span key=${it} style=${{display:'flex',alignItems:'center',gap:5,background:C.sageLt,color:C.sage,borderRadius:7,padding:'6px 8px 6px 11px',fontSize:13,fontWeight:600}}>
            ${it}<button onClick=${()=>removeMealItem(mpCell.day,mpCell.who,mpCell.slot,it)} style=${{background:'none',border:'none',cursor:'pointer',color:C.sage,fontSize:14,padding:0,lineHeight:1}}>✕</button>
          </span>`) : html`<span style=${{fontSize:13,color:C.textMuted,fontStyle:'italic'}}>Nothing added yet</span>`}
        </div>
        <div style=${{display:'flex',gap:8,marginBottom:18}}>
          <input value=${mpCustomText} onInput=${e=>setMpCustomText(e.target.value)} list="mp-recipe-list"
            onKeyDown=${e=>{ if(e.key==='Enter'){ addCustomMealItem(mpCell.day,mpCell.who,mpCell.slot,mpCustomText); setMpCustomText(''); } }}
            placeholder="Add item (e.g. Dal, Rice, Sabji)…"
            style=${{flex:1,border:`1.5px solid ${C.border}`,borderRadius:8,padding:'9px 12px',fontSize:14,fontFamily:'inherit',background:C.cream,color:C.text}}/>
          <${Btn} small onClick=${()=>{addCustomMealItem(mpCell.day,mpCell.who,mpCell.slot,mpCustomText); setMpCustomText('');}}>Add<//>
        </div>
        <datalist id="mp-recipe-list">${data.recipes.map(r=>html`<option key=${r.id} value=${r.name}/>`)}</datalist>
        ${data.recipes.length>0&&html`<div>
          <div style=${{fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:8,letterSpacing:0.3}}>YOUR RECIPES</div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:6}}>
            ${data.recipes.map(r=>{ const active=getMealItems(mpCell.day,mpCell.who,mpCell.slot).includes(r.name); return html`<button key=${r.id} onClick=${()=>toggleMealItem(mpCell.day,mpCell.who,mpCell.slot,r.name)}
              style=${{border:`1.5px solid ${active?C.sage:C.border}`,background:active?C.sage:'transparent',color:active?'#fff':C.text,borderRadius:7,padding:'6px 11px',fontSize:12.5,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>${active?'✓ ':''}${r.name}</button>`; })}
          </div>
        </div>`}
        <div style=${{display:'flex',justifyContent:'flex-end',marginTop:20}}>
          <${Btn} small onClick=${()=>setMpCell(null)}>Done<//>
        </div>
      </div>`}
    <//>
    <${Modal} title=${view?.name||''} open=${!!view} onClose=${()=>setView(null)}>
      ${view&&html`<div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          <${Badge} color="sage">${view.category}<//>
          <${Badge} color="amber">Serves ${view.servings}<//>
          <${Badge} color="blue">Prep ${view.prepTime}<//>
          <${Badge} color="purple">Cook ${view.cookTime}<//>
        </div>
        ${view.nutrition&&html`<div style=${{display:'flex',gap:10,background:C.sageLt,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
          ${[['Calories',view.nutrition.calories,''],['Protein',view.nutrition.protein,'g'],['Carbs',view.nutrition.carbs,'g'],['Fat',view.nutrition.fat,'g']].map(([l,v,u])=>html`<div key=${l} style=${{textAlign:'center',flex:1}}><div style=${{fontSize:18,fontWeight:700,color:C.sage}}>${v}${u}</div><div style=${{fontSize:11,color:C.textMuted}}>${l}</div></div>`)}
        </div>`}
        <div style=${{marginBottom:12}}><div style=${{fontWeight:700,fontSize:13,marginBottom:6,color:C.text}}>Ingredients</div><div style=${{fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:'pre-wrap',background:C.cream,borderRadius:8,padding:'10px 12px'}}>${view.ingredients}</div></div>
        <div style=${{marginBottom:12}}><div style=${{fontWeight:700,fontSize:13,marginBottom:6,color:C.text}}>Instructions</div><div style=${{fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:'pre-wrap',background:C.cream,borderRadius:8,padding:'10px 12px'}}>${view.instructions}</div></div>

        <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>

        </div>
      </div>`}
    <//>
    <${Modal} title=${edit?'Edit Recipe':'New Recipe'} open=${modal} onClose=${()=>setModal(false)}>
      <div style=${{display:'flex',flexDirection:'column',gap:13}}>

          <${Inp} label="Recipe Name" value=${f.name} onChange=${v=>setF({...f,name:v})} required=${true}/>
          <${Inp} label="Category" value=${f.category} onChange=${v=>setF({...f,category:v})} placeholder="Indian, Breakfast..."/>

        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          <${Inp} label="Servings" type="number" value=${f.servings} onChange=${v=>setF({...f,servings:+v})}/>
          <${Inp} label="Prep Time" value=${f.prepTime} onChange=${v=>setF({...f,prepTime:v})} placeholder="10 min"/>
          <${Inp} label="Cook Time" value=${f.cookTime} onChange=${v=>setF({...f,cookTime:v})} placeholder="30 min"/>
        </div>
        <${Inp} label="Tags" value=${f.tags} onChange=${v=>setF({...f,tags:v})} placeholder="vegetarian, quick..."/>
        <${Txa} label="Ingredients" value=${f.ingredients} onChange=${v=>setF({...f,ingredients:v})} rows=${4} placeholder="One per line..."/>
        <${Txa} label="Instructions" value=${f.instructions} onChange=${v=>setF({...f,instructions:v})} rows=${4} placeholder="Step by step..."/>
        <${Inp} label="Note" value=${f.note} onChange=${v=>setF({...f,note:v})} placeholder="Tips..."/>
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>Nutrition per serving</label>
            <${Btn} variant="outline" small onClick=${calcNutrition}>${aiLoading?'⏳...':'✦ AI Calc'}<//>
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            ${['calories','protein','carbs','fat'].map(k=>html`<${Inp} key=${k} label=${k[0].toUpperCase()+k.slice(1)} type="number" value=${f.nutrition?.[k]||''} onChange=${v=>setF({...f,nutrition:{...f.nutrition,[k]:+v}})}/>` )}

          <${Btn} variant="outline" onClick=${()=>setModal(false)}>Cancel<//>
          <${Btn} onClick=${save}>Save<//>

      </div>

}

// ── HOME CARE ─────────────────────────────────────────────────────────────────
function HomeCare({data,updateData}) {
  const [tab,setTab] = useState('maintenance');
  const [modal,setModal] = useState(false);
  const [edit,setEdit] = useState(null);
  const [f,setF] = useState({});
  const [cf,setCf] = useState('weekly');
  const openM = item => { setEdit(item||null); setF(item||{task:'',frequency:'Monthly',lastDone:today(),nextDue:'',notes:''}); setModal(true); };
  const saveM = () => { if(!f.task) return; updateData({maintenance:edit?data.maintenance.map(m=>m.id===edit.id?{...f,id:edit.id}:m):[...data.maintenance,{...f,id:uid()}]}); setModal(false); };
  const delM = id => updateData({maintenance:data.maintenance.filter(m=>m.id!==id)});
  const toggleC = (freq,id) => updateData({cleaning:{...data.cleaning,[freq]:data.cleaning[freq].map(t=>t.id===id?{...t,done:!t.done}:t)}});
  const resetC = freq => updateData({cleaning:{...data.cleaning,[freq]:data.cleaning[freq].map(t=>({...t,done:false}))}});
  const addC = freq => { const task=prompt('New task:'); if(task) updateData({cleaning:{...data.cleaning,[freq]:[...data.cleaning[freq],{id:uid(),task,done:false,assigned:'Me'}]}}); };
  const sc = d => { const du=daysUntil(d); return du<0?'red':du<=3?'coral':du<=14?'amber':'sage'; };
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Home Care</h2>
      ${tab==='maintenance'&&html`<${Btn} small onClick=${()=>openM(null)}>+ Add<//>`}
    </div>
    <div style=${{display:'flex',gap:6,marginBottom:16}}>
      ${[['maintenance','🔧 Maintenance'],['cleaning','🧹 Cleaning']].map(([k,l])=>html`<button key=${k} onClick=${()=>setTab(k)} style=${{border:`1.5px solid ${tab===k?C.sage:C.border}`,background:tab===k?C.sage:'transparent',color:tab===k?'#fff':C.textMuted,borderRadius:8,padding:'8px 16px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>${l}</button>`)}
    </div>
    ${tab==='maintenance'&&html`<div style=${{display:'flex',flexDirection:'column',gap:8}}>
      ${[...data.maintenance].sort((a,b)=>daysUntil(a.nextDue)-daysUntil(b.nextDue)).map(m=>html`<${Card} key=${m.id} style=${{padding:'13px 15px'}}>
        <div style=${{display:'flex',alignItems:'flex-start',gap:10}}>
          <div style=${{flex:1}}>
            <div style=${{fontWeight:600,fontSize:15,color:C.text,marginBottom:3}}>${m.task}</div>
            <div style=${{fontSize:12,color:C.textMuted,display:'flex',gap:10,flexWrap:'wrap'}}>
              <span>🔄 ${m.frequency}</span>
              ${m.lastDone&&html`<span>✓ ${fmt(m.lastDone)}</span>`}
              ${m.nextDue&&html`<span>📅 ${fmt(m.nextDue)}</span>`}
            </div>
            ${m.notes&&html`<div style=${{fontSize:12,color:C.textMuted,marginTop:2}}>${m.notes}</div>`}
          </div>
          <div style=${{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            ${m.nextDue&&html`<${Badge} color=${sc(m.nextDue)} small>${daysUntil(m.nextDue)<0?'Overdue':daysUntil(m.nextDue)===0?'Today':`${daysUntil(m.nextDue)}d`}<//>` }
            <${Btn} variant="ghost" small onClick=${()=>openM(m)}>✎<//>
            <${Btn} variant="ghost" small onClick=${()=>delM(m.id)}>✕<//>
          </div>
        </div>
      <//>` )}
    </div>`}
    ${tab==='cleaning'&&html`<div>
      <div style=${{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        ${['daily','weekly','monthly','quarterly'].map(v=>html`<button key=${v} onClick=${()=>setCf(v)} style=${{border:`1.5px solid ${cf===v?C.sage:C.border}`,background:cf===v?C.sageLt:'transparent',color:cf===v?C.sage:C.textMuted,borderRadius:8,padding:'6px 14px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',textTransform:'capitalize'}}>${v}</button>`)}
      </div>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style=${{color:C.textMuted,fontSize:13}}>${data.cleaning[cf].filter(t=>t.done).length}/${data.cleaning[cf].length} done</span>
        <div style=${{display:'flex',gap:6}}>
          <${Btn} variant="outline" small onClick=${()=>resetC(cf)}>Reset<//>
          <${Btn} small onClick=${()=>addC(cf)}>+ Add<//>
        </div>
      </div>
      <${Card}>
        ${data.cleaning[cf].map(t=>html`<div key=${t.id} style=${{display:'flex',alignItems:'center',gap:11,padding:'11px 0',borderBottom:`1px solid ${C.border}`}}>
          <div onClick=${()=>toggleC(cf,t.id)} style=${{width:22,height:22,borderRadius:6,border:`2px solid ${t.done?C.sage:C.borderMd}`,background:t.done?C.sage:'transparent',cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            ${t.done&&html`<span style=${{color:'#fff',fontSize:12}}>✓</span>`}
          </div>
          <span style=${{flex:1,fontSize:15,color:t.done?C.textMuted:C.text,textDecoration:t.done?'line-through':'none'}}>${t.task}</span>
          ${t.assigned&&html`<${Badge} small>${t.assigned}<//>` }
        </div>`)}
      <//>
    </div>`}
    <${Modal} title=${edit?'Edit Task':'New Maintenance Task'} open=${modal} onClose=${()=>setModal(false)}>
      <div style=${{display:'flex',flexDirection:'column',gap:13}}>
        <${Inp} label="Task" value=${f.task||''} onChange=${v=>setF({...f,task:v})} required=${true}/>
        <${Sel} label="Frequency" value=${f.frequency||'Monthly'} onChange=${v=>setF({...f,frequency:v})} options=${['Weekly','Monthly','Biannual','Annual','Quarterly','As needed']}/>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <${Inp} label="Last Done" type="date" value=${f.lastDone||''} onChange=${v=>setF({...f,lastDone:v})}/>
          <${Inp} label="Next Due" type="date" value=${f.nextDue||''} onChange=${v=>setF({...f,nextDue:v})}/>
        </div>
        <${Inp} label="Notes" value=${f.notes||''} onChange=${v=>setF({...f,notes:v})}/>
        <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <${Btn} variant="outline" onClick=${()=>setModal(false)}>Cancel<//>
          <${Btn} onClick=${saveM}>Save<//>
        </div>
      </div>
    <//>
  </div>`;
}

// ── BABY CORNER ───────────────────────────────────────────────────────────────
function BabyCorner({data,updateData}) {
  const [tab,setTab] = useState('lessons');

// ── ATTACHMENTS ───────────────────────────────────────────────────────────────
function AttachmentEditor({attachments=[],onChange,area,itemId}) {
  const [progress,setProgress]=useState(0);
  const [busy,setBusy]=useState(false);
  const add = async files => {
    if(!files?.length) return;
    setBusy(true); setProgress(0);
    try { const added=await uploadFiles(files,area,itemId,setProgress); onChange([...(attachments||[]),...added]); }
    catch(e){ alert(e.message||'Upload failed.'); }
    finally { setBusy(false); setProgress(0); }
  };
  const remove = async att => {
    if(!confirm(`Delete ${att.originalName}?`)) return;
    try { await deleteStoredAttachment(att); onChange(attachments.filter(x=>x.id!==att.id)); }
    catch(e){ alert(`Could not delete file: ${e.message}`); }
  };
  return html`<div style=${{display:'flex',flexDirection:'column',gap:9}}>
    <label style=${{fontSize:13,fontWeight:600,color:C.textMuted}}>Attachments</label>
    <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
      <label style=${{border:`1.5px dashed ${C.sageMd}`,background:C.sageLt,color:C.sage,borderRadius:8,padding:'9px 12px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
        📎 Image / PDF<input type="file" multiple accept="image/*,application/pdf" onChange=${e=>add(e.target.files)} style=${{display:'none'}}/>
      </label>
      <label style=${{border:`1.5px dashed ${C.blue}`,background:C.blueLt,color:C.blue,borderRadius:8,padding:'9px 12px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
        📷 Camera<input type="file" accept="image/*" capture="environment" onChange=${e=>add(e.target.files)} style=${{display:'none'}}/>
      </label>
    </div>
    ${busy&&html`<div style=${{fontSize:12,color:C.sage}}>Uploading… ${progress}%</div>`}
    ${(attachments||[]).map(att=>html`<div key=${att.id} style=${{display:'flex',alignItems:'center',gap:8,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 10px'}}>
      <span>${att.mimeType==='application/pdf'?'📄':'🖼️'}</span>
      <button type="button" onClick=${()=>previewAttachment(att)} style=${{flex:1,textAlign:'left',border:'none',background:'none',cursor:'pointer',color:C.blue,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${att.originalName}</button>
      <span style=${{fontSize:11,color:C.textLight}}>${formatBytes(att.sizeBytes||0)}</span>
      <${Btn} type="button" variant="ghost" small onClick=${()=>remove(att)}>✕<//>
    </div>`)}
  </div>`;
}

function ReceiptsCoupons({data,updateData}) {
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(false);
  const [edit,setEdit]=useState(null);
  const blank=()=>({id:uid(),type:'receipt',title:'',merchant:'',purchaseDate:today(),amount:'',category:'',tags:'',returnDate:'',expirationDate:'',notes:'',attachments:[]});
  const [f,setF]=useState(blank());
  const open=item=>{setEdit(item||null);setF(item?{...item,attachments:item.attachments||[]}:blank());setModal(true);};
  const save=()=>{
    if(!f.title.trim()) return;
    const item={...f,updatedAt:new Date().toISOString(),createdAt:f.createdAt||new Date().toISOString()};
    updateData({receiptsCoupons:edit?data.receiptsCoupons.map(r=>r.id===edit.id?item:r):[...data.receiptsCoupons,item]});
    setModal(false);
  };
  const del=async item=>{
    if(!confirm(`Delete “${item.title}” and its attachments?`)) return;
    try { await Promise.all((item.attachments||[]).map(deleteStoredAttachment)); updateData({receiptsCoupons:data.receiptsCoupons.filter(r=>r.id!==item.id)}); }
    catch(e){ alert(`Delete failed: ${e.message}`); }
  };
  const q=search.trim().toLowerCase();
  const filtered=data.receiptsCoupons.filter(r=>!q||[r.title,r.merchant,r.category,r.tags,r.notes,r.type].join(' ').toLowerCase().includes(q));
  return html`<div>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <h2 style=${{margin:0,fontSize:22,fontWeight:700,fontFamily:"'DM Serif Display',serif",color:C.text}}>Receipts & Coupons</h2>
      <${Btn} small onClick=${()=>open(null)}>+ Add<//>
    </div>
    <${Inp} value=${search} onChange=${setSearch} placeholder="Search title, merchant, category, tags or notes…" style=${{marginBottom:14}}/>
    <div style=${{display:'flex',flexDirection:'column',gap:10}}>
      ${filtered.map(r=>{const returnDays=r.returnDate?daysUntil(r.returnDate):null;const expDays=r.expirationDate?daysUntil(r.expirationDate):null;return html`<${Card} key=${r.id} style=${{padding:'14px 16px'}}>
        <div style=${{display:'flex',gap:10,alignItems:'flex-start'}}>
          <div style=${{fontSize:22}}>${r.type==='coupon'?'🎟️':'🧾'}</div>

// ── DATA MANAGEMENT (BULK IMPORT/EXPORT) ──────────────────────────────────────
function DataManagement({data, updateData}) {
  const [tab, setTab] = useState('import');
  const [csvData, setCsvData] = useState([]);
  const [section, setSection] = useState('calendar');
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [step, setStep] = useState(0);
  const [status, setStatus] = useState('');
  const [selectedFile, setSelectedFile] = useState(null);
  const [importType, setImportType] = useState('csv');
  
  const sections = {
    calendar:{label:'Calendar Events',req:['title','date'],fields:['title','date','type','notes']},
    kitchen:{label:'Recipes',req:['name'],fields:['name','ingredients','instructions','servings','prepTime','cookTime','category','tags','nutrition','note']},
    groceries:{label:'Groceries Master',req:['name'],fields:['name','category','tags','note']},
    tasks:{label:'Tasks',req:['title'],fields:['title','priority','owner','status','dueDate','tags','note']},
    homecare:{label:'Maintenance',req:['task'],fields:['task','frequency','lastDone','nextDue','notes']},
  };
  
  const handleFileSelect = e => {
    const f = e.target.files[0];
    if (f) { setSelectedFile(f); setStatus(''); }
  };
  
  const handleProcessJSON = () => {
    if (!selectedFile) { setStatus('❌ Select a file first'); return; }
    
    setStatus('⏳ Processing JSON...');
    
    try {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const jsonData = JSON.parse(e.target.result);
          if (!Array.isArray(jsonData)) { setStatus('❌ JSON must be an array'); return; }
          if (jsonData.length === 0) { setStatus('❌ JSON is empty'); return; }
          
          setCsvData(jsonData);
          const firstItem = jsonData[0];
          const fields = Object.keys(firstItem);
          const m = {};
          fields.forEach(f => m[f] = f);
          setMapping(m);
          
          const p = jsonData.slice(0, 3).map(row => {
            const o = {};
            fields.forEach(f => { o[f] = row[f] || ''; });
            return o;
          });
          setPreview(p);
          setStep(1);
          setStatus('');
        } catch(err) {
          setStatus(`❌ Invalid JSON: ${err.message}`);
        }
      };
      reader.onerror = () => setStatus('❌ Failed to read file');
      reader.readAsText(selectedFile);
    } catch(err) {
      setStatus(`❌ Error: ${err.message}`);
    }
  };
  
  const handleProcessCSV = () => {
    if (!selectedFile) { setStatus('❌ Select a file first'); return; }
    
    setStatus('⏳ Processing...');
    
    try {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const csv = e.target.result;
          const lines = csv.split('\n').filter(l => l.trim());
          if (lines.length < 2) { setStatus('❌ CSV is empty'); return; }
          
          // Parse header
          const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g,''));
          
          // Parse rows
          const rows = [];
          for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',').map(v => v.trim().replace(/^"/, '').replace(/"$/, ''));
            if (values.length > 0 && values[0]) {
              const row = {};
              headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
              rows.push(row);
            }
          }
          
          if (rows.length === 0) { setStatus('❌ No valid rows found'); return; }
          
          setCsvData(rows);
          const m = {};
          headers.forEach(h => m[h] = h.toLowerCase().replace(/\s+/g,''));
          setMapping(m);
          
          const p = rows.slice(0,3).map(row => {
            const o = {};
            Object.keys(m).forEach(k => { if(m[k]) o[m[k]] = row[k]; });
            return o;
          });
          setPreview(p);
          setStep(1);
          setStatus('');
        } catch(err) {
          setStatus(`❌ ${err.message}`);
        }
      };
      reader.onerror = () => setStatus('❌ Failed to read file');
      reader.readAsText(selectedFile);
    } catch(err) {
      setStatus(`❌ Error: ${err.message}`);
    }
  };
  
  const handleMapping = (csv, app) => {
    const m = {...mapping}; m[csv] = app; setMapping(m);
    const p = csvData.slice(0,3).map(row => {
      const o = {};
      Object.keys(m).forEach(k => { if(m[k]) o[m[k]] = row[k]; });
      return o;
    });
    setPreview(p);
  };
  
  const handleImport = () => {
    const cfg = sections[section];
    const missing = cfg.req.filter(f => !Object.values(mapping).includes(f));
    if (missing.length > 0) { setStatus(`❌ Missing: ${missing.join(', ')}`); return; }
    
    try {
      const transformed = csvData.map((row,idx) => {
        const item = {id:uid()};
        Object.keys(mapping).forEach(csv => {
          const app = mapping[csv];
          if (app && row[csv]) item[app] = row[csv];
        });
        return item;
      });
      
      let updates = {};
      if (section === 'calendar') updates.events = [...(data.events||[]),...transformed];
      else if (section === 'kitchen') updates.recipes = [...(data.recipes||[]),...transformed];
      else if (section === 'groceries') updates.groceries = {...data.groceries, master:[...(data.groceries?.master||[]),...transformed]};
      else if (section === 'tasks') updates.tasks = [...(data.tasks||[]),...transformed];
      else if (section === 'homecare') updates.maintenance = [...(data.maintenance||[]),...transformed];
      
      updateData(updates);
      setStatus(`✅ Imported ${transformed.length} items!`);
      setTimeout(() => { setCsvData([]); setMapping({}); setPreview([]); setStep(0); setSelectedFile(null); }, 1500);
    } catch(err) {
      setStatus(`❌ Import failed: ${err.message}`);
    }
  };
  
  const handleExport = () => {
    try {
      let rows = [], headers = [];
      if (section === 'calendar') { rows = data.events||[]; headers = ['title','date','type','notes']; }
      else if (section === 'kitchen') { rows = data.recipes||[]; headers = ['name','ingredients','instructions','servings','prepTime','cookTime','category','tags','note']; }
      else if (section === 'groceries') { rows = data.groceries?.master||[]; headers = ['name','category','tags','note']; }
      else if (section === 'tasks') { rows = data.tasks||[]; headers = ['title','priority','owner','status','dueDate','tags','note']; }
      else if (section === 'homecare') { rows = data.maintenance||[]; headers = ['task','frequency','lastDone','nextDue','notes']; }
      
      const csv = [headers.join(','), ...rows.map(r=>headers.map(h=>{let v=r[h]||''; if(typeof v==='string'&&v.includes(',')) v=`"${v}"`; return v;}).join(','))].join('\n');
      const blob = new Blob([csv],{type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${section}_${today()}.csv`; a.click();
    } catch(err) {
      alert(`Export failed: ${err.message}`);
    }
  };
  
  const cfg = sections[section];
  return html`<div>
    <h2 style=${{fontSize:22,fontWeight:700,marginBottom:20,color:C.text,fontFamily:"'DM Serif Display',serif"}}>📊 Data Management</h2>
    <div style=${{display:'flex',gap:0,marginBottom:20,borderBottom:`2px solid ${C.border}`}}>

      <button onClick=${()=>setTab('export')} style=${{flex:1,padding:'12px 16px',background:tab==='export'?C.sageLt:'transparent',color:tab==='export'?C.sage:C.textMuted,border:'none',cursor:'pointer',fontWeight:700,fontSize:14,borderRadius:'8px 8px 0 0'}}>📤 Export</button>
    </div>
    
    ${tab === 'import' ? html`
      <div style=${{display:'flex',flexDirection:'column',gap:16}}>
        <${Sel} label="Select section:" value=${section} onChange=${v=>{setSection(v);setStep(0);}} options=${Object.entries(sections).map(([k,c])=>({value:k,label:c.label}))}/>
        ${step === 0 ? html`
          <div style=${{display:'flex',flexDirection:'column',gap:16}}>
            <div style=${{display:'flex',gap:8}}>
              <button onClick=${()=>setImportType('csv')} style=${{flex:1,padding:'8px 12px',background:importType==='csv'?C.sage:C.border,color:importType==='csv'?'white':C.text,border:'none',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>📄 CSV</button>
              <button onClick=${()=>setImportType('json')} style=${{flex:1,padding:'8px 12px',background:importType==='json'?C.sage:C.border,color:importType==='json'?'white':C.text,border:'none',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>📋 JSON</button>
            </div>
            <div style=${{border:`2px dashed ${C.coral}`,borderRadius:12,padding:'40px 20px',textAlign:'center',background:C.coralLt}}>
              <p style=${{fontSize:14,fontWeight:700,color:C.text,marginBottom:8}}>📁 Upload ${importType === 'csv' ? 'CSV' : 'JSON'} File</p>
              <p style=${{fontSize:12,color:C.textMuted,marginBottom:16}}>${importType === 'csv' ? 'Export from Google Sheets as .csv' : 'Upload JSON file with array of items'}</p>
              <input type="file" accept=${importType === 'csv' ? '.csv' : '.json'} onChange=${handleFileSelect} style=${{padding:'8px',marginBottom:'12px'}}/>
              ${selectedFile && html`
                <div style=${{marginBottom:16}}>
                  <p style=${{fontSize:12,color:C.sage,fontWeight:600,marginBottom:8}}>✅ Selected: ${selectedFile.name}</p>
                  <${Btn} onClick=${importType === 'csv' ? handleProcessCSV : handleProcessJSON}>${importType === 'csv' ? 'Process CSV' : 'Process JSON'}<//>
                </div>
              `}
              ${status && html`<p style=${{fontSize:12,color:status.includes('✅')?C.green:status.includes('⏳')?C.text:C.red,marginTop:8,fontWeight:600}}>${status}</p>`}
              <p style=${{fontSize:11,color:C.textMuted,marginTop:16}}>Required: ${cfg.req.join(', ')}</p>
            </div>
          </div>` : html`
          <div>

            <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))',gap:12,marginBottom:20}}>
              ${Object.keys(csvData[0]||{}).map(k=>html`<div key=${k} style=${{padding:12,border:`1px solid ${C.border}`,borderRadius:8,background:C.cream}}>
                <label style=${{display:'block',fontSize:11,fontWeight:700,color:C.textMuted,marginBottom:4}}>CSV: "${k}"</label>
                <select value=${mapping[k]||''} onChange=${e=>handleMapping(k,e.target.value)} style=${{width:'100%',padding:'8px',fontSize:12,border:`1px solid ${C.border}`,borderRadius:6}}>
                  <option>-- Skip --</option>
                  ${cfg.fields.map(f=>html`<option key=${f} value=${f}>${f}</option>`)}
                </select>
              </div>`)}
            </div>
            
            <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12,color:C.text}}>Step 2: Preview</h3>
            <div style=${{overflowX:'auto',marginBottom:16,border:`1px solid ${C.border}`,borderRadius:8}}>
              <table style=${{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
                <thead><tr style=${{background:C.sage,color:'white'}}>
                  ${cfg.fields.map(f=>html`<th key=${f} style=${{padding:'10px',textAlign:'left',borderRight:`1px solid ${C.border}`}}>${f}</th>`)}
                </tr></thead>
                <tbody>
                  ${preview.map((r,i)=>html`<tr key=${i} style=${{background:i%2===0?C.cream:C.card,borderBottom:`1px solid ${C.border}`}}>
                    ${cfg.fields.map(f=>html`<td key=${f} style=${{padding:'10px',borderRight:`1px solid ${C.border}`,maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis'}}>${r[f]||'—'}</td>`)}

                </tbody>
              </table>
            </div>
            
            <p style=${{fontSize:11,color:C.textMuted,marginBottom:16}}>📋 Showing 3 of ${csvData.length} rows</p>
            ${status && html`<div style=${{padding:12,marginBottom:16,background:status.includes('✅')?C.greenLt:C.redLt,color:status.includes('✅')?C.green:C.red,borderRadius:6,fontSize:12,fontWeight:600}}>${status}</div>`}
            
            <div style=${{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <${Btn} variant="outline" onClick=${()=>{setStep(0);setCsvData([]);setSelectedFile(null);}}>Cancel<//>

            </div>
          </div>
        `}
      </div>
    ` : html`
      <div style=${{display:'flex',flexDirection:'column',gap:16}}>
        <${Sel} label="Select section:" value=${section} onChange=${v=>{setSection(v);}} options=${Object.entries(sections).map(([k,c])=>({value:k,label:c.label}))}/>
        
        <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12,color:C.text}}>Export & Clear ${cfg.label}</h3>

          <p style=${{fontSize:12,color:C.textMuted,marginBottom:12}}>${section==='calendar'?data.events?.length:section==='kitchen'?data.recipes?.length:section==='groceries'?data.groceries?.master?.length:section==='tasks'?data.tasks?.length:data.maintenance?.length||0} items</p>

          <${Btn} onClick=${()=>{

              let updates = {};
              if(section==='calendar') updates.events = [];
              else if(section==='kitchen') updates.recipes = [];
              else if(section==='groceries') updates.groceries = {...data.groceries, master:[]};
              else if(section==='tasks') updates.tasks = [];

              updateData(updates);

              setTimeout(()=>setStatus(''),2000);
            }
          }}>🗑️ Delete All ${cfg.label}<//>
        </div>
      </div>
    `}
  </div>`;
}

function AuthScreen() {
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [busy,setBusy]=useState(false);
  const [error,setError]=useState('');
  const submit=async e=>{
    e?.preventDefault(); setError(''); setBusy(true);
    try {
      if(mode==='signup') await auth.createUserWithEmailAndPassword(email.trim(),password);
      else await auth.signInWithEmailAndPassword(email.trim(),password);
    } catch(err) { setError(String(err.message||'Login failed.').replace('Firebase: ','')); }
    finally { setBusy(false); }
  };
  const reset=async()=>{if(!email.trim()){setError('Enter your email first.');return;}try{await auth.sendPasswordResetEmail(email.trim());setError('Password reset email sent.');}catch(e){setError(e.message||'Could not send reset email.');}};
  if(firebaseSetupError||!auth) return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:C.cream}}><${Card} style=${{maxWidth:560}}><h2 style=${{color:C.red,marginBottom:10}}>Firebase setup needed</h2><p style=${{color:C.text,lineHeight:1.6}}>${firebaseSetupError||'Firebase Authentication is unavailable.'}</p><p style=${{color:C.textMuted,marginTop:10,fontSize:13}}>Open firebase-config.js in GitHub, replace every PASTE_ value using Firebase Console → Project settings → Your apps → SDK setup and configuration → Config, and commit the change.</p><//></div>`;
  return html`<div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:`linear-gradient(145deg,${C.sageLt},${C.cream},${C.amberLt})`}}>
    <${Card} style=${{width:'100%',maxWidth:420,padding:'28px'}}>
      <div style=${{width:48,height:48,borderRadius:14,background:C.sage,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,marginBottom:16}}>✦</div>
      <h1 style=${{fontFamily:"'DM Serif Display',serif",fontSize:27,color:C.text,marginBottom:4}}>Family Life OS</h1>
      <p style=${{color:C.textMuted,fontSize:14,marginBottom:20}}>${mode==='signup'?'Create your private account':'Sign in to sync your devices'}</p>
      <form onSubmit=${submit} style=${{display:'flex',flexDirection:'column',gap:13}}>
        <${Inp} label="Email" type="email" value=${email} onChange=${setEmail} required=${true}/>
        <${Inp} label="Password" type="password" value=${password} onChange=${setPassword} required=${true}/>
        ${error&&html`<div style=${{background:error.includes('sent')?C.greenLt:C.redLt,color:error.includes('sent')?C.green:C.red,borderRadius:8,padding:'10px 12px',fontSize:13}}>${error}</div>`}
        <${Btn} disabled=${busy||!email||password.length<6} onClick=${submit} style=${{justifyContent:'center'}}>${busy?'Please wait…':mode==='signup'?'Create account':'Sign in'}<//>
      </form>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,gap:8}}>
        <button onClick=${()=>{setMode(mode==='signup'?'signin':'signup');setError('');}} style=${{border:'none',background:'none',color:C.sage,cursor:'pointer',fontWeight:600}}>${mode==='signup'?'Already have an account?':'Create account'}</button>
        ${mode==='signin'&&html`<button onClick=${reset} style=${{border:'none',background:'none',color:C.textMuted,cursor:'pointer',fontSize:12}}>Forgot password?</button>`}
      </div>
    <//>
  </div>`;
}

function Root() {
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  useEffect(()=>{
    if(!auth){setReady(true);return;}
    return auth.onAuthStateChanged(u=>{setUser(u);setReady(true);});
  },[]);
  if(!ready) return html`<div style=${{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:C.sage}}>Loading ✦</div>`;
  return user ? html`<${App} user=${user}/>` : html`<${AuthScreen}/>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${Root}/>`);
</script>
</body>
</html>
